<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Hamburguesas</title>

<style>
body { font-family: Arial, sans-serif; background:#fefaf0; margin:0; text-align:center; }

header { margin-top:20px; }
header img.logo { width:120px; }
header h1 { font-size:28px; color:#c24a00; }
header img.icono { width:60px; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:140px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}
.product img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px 10px 0 0;
}
.product h3 { margin:10px 0 5px; }

/* BOTONES */
.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  z-index: 9998;
}

.btn-flotante {
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  width: 140px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

#btnPizza { background:#ffc107; color:#000; }
#btnLomitos { background:#ff5722; }
#btnBebidas { background:#00bcd4; }
#btnCarrito { background:#007bff; }

/* PEDIDO */
#pedido-flotante {
  position: fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:380px;
  max-width:95%;
  background:#fff;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  transition:0.3s;
  z-index:10000;
  padding:15px;
  border-radius:10px;
  text-align:left;
}
#pedido-flotante.activo {
  transform:translate(-50%,-50%) scale(1);
}

#popup-cantidad {
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.5);
 justify-content:center;
 align-items:center;
 z-index:10001;
}
.popup-content {
 background:white;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Hamburguesas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div class="menu-container" id="menu"></div>

<!-- PEDIDO -->
<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar">Borrar</button>
<button id="enviar-whatsapp">Enviar</button>
</div>

<!-- POPUP -->
<div id="popup-cantidad">
<div class="popup-content">
<h3 id="popup-nombre"></h3>
<input type="number" id="popup-input" value="1" min="1">
<br><br>
<button onclick="confirmarCantidad()">Agregar</button>
<button onclick="cerrarPopup()">Cancelar</button>
</div>
</div>

<!-- BOTONES -->
<div class="btn-grid">

<div id="mensaje-total" style="display:none;
background:#28a745;color:#fff;padding:8px 14px;margin-bottom:5px;
border-radius:10px;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.3);
grid-column:span 2;text-align:center;">
💰 Total: Gs. 0
</div>

<button id="btnPizza" class="btn-flotante">PIZZAS</button>
<button id="btnLomitos" class="btn-flotante">LOMITOS</button>
<button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
<button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>

</div>

<script>
function actualizarMensajeTotal() {
  const pedido = JSON.parse(localStorage.getItem("carritoPedido")) || [];
  const mensajeTotal = document.getElementById("mensaje-total");
  if (!mensajeTotal) return;

  if (pedido.length > 0) {
    const total = pedido.reduce((sum, p) => sum + p.precio, 0);
    mensajeTotal.textContent = `💰 Total: Gs. ${total.toLocaleString()}`;
    mensajeTotal.style.display = "block";
  } else {
    mensajeTotal.style.display = "none";
  }
}

const pedidoKey = "carritoPedido";
let productoSeleccionado = {};

// LINKS
btnPizza.onclick = () => location.href="https://alo-rico.github.io/pizza/";
btnLomitos.onclick = () => location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick = () => location.href="https://alo-rico.github.io/bebidas/";

btnCarrito.onclick = () => {
 document.getElementById("pedido-flotante").classList.toggle("activo");
};

// CERRAR PEDIDO AL TOCAR AFUERA
document.addEventListener("click", function(e) {
  const panel = document.getElementById("pedido-flotante");
  const boton = document.getElementById("btnCarrito");
  if (panel.classList.contains("activo") && !panel.contains(e.target) && e.target !== boton) {
    panel.classList.remove("activo");
  }
});

// CARGAR MENU
document.addEventListener('DOMContentLoaded', async () => {

const res = await fetch("https://raw.githubusercontent.com/Alo-Rico/hamburguesa/main/precios.json");
const productos = await res.json();

const menu = document.getElementById('menu');

Object.entries(productos).forEach(([nombre, info]) => {

  const card = document.createElement('div');
  card.className = 'product';

  card.innerHTML = `
    <img src="imagen/${info.imagen}" class="img-click">
    <h3>${nombre}</h3>
    <p>Gs. ${info.precio.toLocaleString()}</p>
  `;

  card.querySelector(".img-click").onclick = () => abrirPopup(nombre, info.precio);

  menu.appendChild(card);

});

renderPedido();
actualizarMensajeTotal();

});

// POPUP
function abrirPopup(nombre, precio){
  productoSeleccionado={nombre,precio};
  document.getElementById("popup-nombre").innerText=nombre;
  document.getElementById("popup-cantidad").style.display="flex";
}

function cerrarPopup(){
 document.getElementById("popup-cantidad").style.display="none";
}

function confirmarCantidad(){
 const cant = parseInt(document.getElementById("popup-input").value)||1;
 const pedido = JSON.parse(localStorage.getItem(pedidoKey))||[];

 pedido.push({
  nombre: productoSeleccionado.nombre+" x"+cant,
  precio: productoSeleccionado.precio*cant
 });

 localStorage.setItem(pedidoKey, JSON.stringify(pedido));

 cerrarPopup();
 renderPedido();
 actualizarMensajeTotal();
}

// PEDIDO
function renderPedido(){
 const lista=document.getElementById("lista-pedido");
 const totalTxt=document.getElementById("total-pedido");

 const pedido=JSON.parse(localStorage.getItem(pedidoKey))||[];

 lista.innerHTML="";
 let total=0;

 pedido.forEach((p,i)=>{
  const li=document.createElement("li");
  li.innerHTML = `${p.nombre} - Gs. ${p.precio.toLocaleString()} 
  <img src="basurero.png" onclick="eliminarItem(${i})" style="width:18px;float:right;cursor:pointer;">`;
  lista.appendChild(li);
  total+=p.precio;
 });

 totalTxt.innerText="Total: Gs. "+total.toLocaleString();
}

function eliminarItem(i){
 const pedido=JSON.parse(localStorage.getItem(pedidoKey))||[];
 pedido.splice(i,1);
 localStorage.setItem(pedidoKey, JSON.stringify(pedido));
 renderPedido();
 actualizarMensajeTotal();
}

document.getElementById("btn-borrar").onclick = ()=>{
 localStorage.removeItem(pedidoKey);
 renderPedido();
 actualizarMensajeTotal();
 document.getElementById("pedido-flotante").classList.remove("activo");
};

document.getElementById("enviar-whatsapp").onclick = ()=>{
 const pedido=JSON.parse(localStorage.getItem(pedidoKey))||[];
 if(pedido.length===0) return alert("No hay nada en el pedido");

 let msg="Hola, quiero pedir:%0A";
 pedido.forEach(p=> msg+=`- ${p.nombre}%0A`);

 const total = pedido.reduce((sum,p)=>sum+p.precio,0);

 window.open(`https://wa.me/+595971891251?text=${msg}%0ATotal: Gs. ${total.toLocaleString()}`);

 localStorage.removeItem(pedidoKey);
 renderPedido();
 actualizarMensajeTotal();
 document.getElementById("pedido-flotante").classList.remove("activo");
};

</script>

</body>
</html>
