<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Hamburguesas</title>

<style>
body { font-family: Arial, sans-serif; background:#fefaf0; margin:0; text-align:center; }
header { margin-top:20px; }
header img.logo { width:120px; }
header h1 { font-size:28px; color:#c24a00; }
header img.icono { width:60px; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:140px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}
.product img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px 10px 0 0;
}
.product h3 { margin:10px 0 5px; }

/* 🔥 EXACTO IGUAL A BEBIDAS */
.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  z-index: 9998;
}

.btn-flotante {
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  width: 140px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

#btnPizza { background:#ffc107; color:#000; }
#btnLomitos { background:#ff5722; }
#btnBebidas { background:#00bcd4; }
#btnCarrito { background:#007bff; }

</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Hamburguesas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div class="menu-container" id="menu"></div>

<!-- 🔥 BOTONES COMPLETOS -->
<div class="btn-grid">
  <button id="btnPizza" class="btn-flotante">PIZZAS</button>
  <button id="btnLomitos" class="btn-flotante">LOMITOS</button>
  <button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
  <button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<script>
document.getElementById("btnPizza").onclick = () => {
  window.location.href = "https://alo-rico.github.io/pizza/";  
};

document.getElementById("btnLomitos").onclick = () => {
  window.location.href = "https://alo-rico.github.io/lomitos/";
};

document.getElementById("btnBebidas").onclick = () => {
  window.location.href = "https://alo-rico.github.io/bebidas/";
};

document.getElementById("btnCarrito").onclick = () => {
  alert("Abrir pedido (igual que bebidas)");
};

// CARGAR MENU
document.addEventListener('DOMContentLoaded', async () => {
  const menu = document.getElementById('menu');

  const res = await fetch("https://raw.githubusercontent.com/Alo-Rico/precios-alorico-hamburguesa/main/precios.json");
  const productos = await res.json();

  Object.entries(productos).forEach(([nombre, info]) => {
    const card = document.createElement('div');
    card.className = 'product';
    card.innerHTML = `
      <img src="imagen/${info.imagen}">
      <h3>${nombre}</h3>
      <p>Gs. ${info.precio.toLocaleString()}</p>
    `;
    menu.appendChild(card);
  });
});
</script>

</body>
</html>
