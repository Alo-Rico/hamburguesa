<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 onValue,
 remove
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

/* MESA */

const params =
new URLSearchParams(window.location.search);

const mesa =
params.get("mesa") || "general";

/* FIREBASE */

const firebaseConfig = {

 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",

 authDomain: "alorico-59754.firebaseapp.com",

 databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",

 projectId: "alorico-59754",

 storageBucket: "alorico-59754.firebasestorage.app",

 messagingSenderId: "120993494626",

 appId: "1:120993494626:web:9f9cb0ad6fbfbd1abd033b"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* CLIENTE */

const clienteId =
"mesa_" + mesa;

const pedidoRef =
ref(db,"pedidos/" + clienteId);

/* TITULO */

document.querySelector("#pedido-flotante h3")
.innerText =
`Mi Pedido - Mesa ${mesa}`;

/* NAV */

document.getElementById("btnPizza").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/pizza/?mesa=${mesa}`;
};

document.getElementById("btnLomitos").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/lomitos/?mesa=${mesa}`;
};

document.getElementById("btnBebidas").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/bebidas/?mesa=${mesa}`;
};

document.getElementById("btnCarrito").onclick = ()=>{

 const p = document.getElementById("pedido-flotante");

 p.classList.toggle("activo");

 if(p.classList.contains("activo")){

  setTimeout(()=>{

   p.classList.remove("activo");

  },7000);
 }
};

/* TOTAL */

function actualizarMensajeTotal(total){

 const mensaje =
 document.getElementById("mensaje-total");

 if(total > 0){

  mensaje.innerText =
  `💰 Mesa ${mesa} - Total: Gs. ${total.toLocaleString()}`;

  mensaje.style.display = "block";

 }else{

  mensaje.style.display = "none";
 }
}

/* ESCUCHAR PEDIDO */

onValue(pedidoRef,(snapshot)=>{

 const data = snapshot.val();

 const lista =
 document.getElementById("lista-pedido");

 const totalTxt =
 document.getElementById("total-pedido");

 lista.innerHTML = "";

 let total = 0;

 if(data){

  Object.entries(data).forEach(([key,p])=>{

   const li = document.createElement("li");

   li.innerHTML = `
   <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">

    <span>${p.cantidad} x ${p.nombre}</span>

    <span
      onclick="eliminarItem('${key}')"
      style="
      background:#f44336;
      color:white;
      width:24px;
      height:24px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:12px;
      font-weight:bold;
      ">
      🗑
    </span>

   </div>
   `;

   lista.appendChild(li);

   total += p.precio * p.cantidad;
  });

  totalTxt.innerText =
  "Total: Gs. " + total.toLocaleString();

  actualizarMensajeTotal(total);

 }else{

  totalTxt.innerText="";

  actualizarMensajeTotal(0);
 }
});

/* POPUP */

let productoSeleccionado = {};

window.abrirPopup = (n,p)=>{

 productoSeleccionado = {
  nombre:n,
  precio:p
 };

 document.getElementById("popup-nombre").innerText = n;

 document.getElementById("popup-input").value = 1;

 document.getElementById("popup-cantidad").style.display="flex";
};

window.cerrarPopup = ()=>{

 document.getElementById("popup-cantidad").style.display="none";
};

window.confirmarCantidad = ()=>{

 const cant =
 parseInt(document.getElementById("popup-input").value)||1;

 push(pedidoRef,{
  nombre:productoSeleccionado.nombre,
  precio:productoSeleccionado.precio,
  cantidad:cant
 });

 cerrarPopup();
};

/* ELIMINAR */

window.eliminarItem = (key)=>{

 remove(ref(db,"pedidos/" + clienteId + "/" + key));
};

/* BORRAR */

document.getElementById("btn-borrar").onclick = ()=>{

 remove(pedidoRef);
};

/* WHATSAPP */

document.getElementById("enviar-whatsapp").onclick = ()=>{

 onValue(pedidoRef,(snap)=>{

  const data = snap.val();

  if(!data){

   alert("Sin pedido");

   return;
  }

  let txt = "";

  let total = 0;

  Object.values(data).forEach(p=>{

   txt += `- ${p.nombre} x${p.cantidad}%0A`;

   total += p.precio * p.cantidad;
  });

  const msg =
  `Hola envio mi pedido - Mesa ${mesa}:%0A${txt}%0ATotal: Gs. ${total.toLocaleString()}`;

  window.open(
   `https://wa.me/+595971891251?text=${msg}`
  );

 },{onlyOnce:true});
};

/* MENU */

const res = await fetch("./precios.json");

const data = await res.json();

Object.entries(data).forEach(([n,i])=>{

 const card = document.createElement("div");

 card.className = "product";

 card.innerHTML = `
  <img src="imagen/${i.imagen}">
  <h3>${n}</h3>
  <p>Gs. ${i.precio.toLocaleString()}</p>
 `;

 card.addEventListener("click",(e)=>{

  e.stopPropagation();

  abrirPopup(n,i.precio);

 });

 document.getElementById("menu").appendChild(card);
});

</script>
