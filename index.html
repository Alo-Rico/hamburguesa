<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Hamburguesas</title>

<style>
body { font-family: Arial, sans-serif; background:#fefaf0; margin:0; text-align:center; }

header { margin-top:20px; }
header img.logo { width:120px; }
header h1 { font-size:28px; color:#c24a00; }
header img.icono { width:60px; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:140px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}
.product img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px 10px 0 0;
}

/* BOTONES */
.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  z-index: 9998;
}

.btn-flotante {
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  width: 140px;
}

#btnPizza { background:#ffc107; color:#000; }
#btnLomitos { background:#ff5722; }
#btnBebidas { background:#00bcd4; }
#btnCarrito { background:#007bff; }

/* PEDIDO */
#pedido-flotante {
  position: fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:380px;
  max-width:95%;
  background:#fff;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  transition:0.3s;
  z-index:10000;
  padding:15px;
  border-radius:10px;
  text-align:left;
}
#pedido-flotante.activo {
  transform:translate(-50%,-50%) scale(1);
}

#popup-cantidad {
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.5);
 justify-content:center;
 align-items:center;
 z-index:10001;
}
.popup-content {
 background:white;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Hamburguesas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div class="menu-container" id="menu"></div>

<!-- PEDIDO -->
<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar">Borrar</button>
<button id="enviar-whatsapp">Enviar</button>
</div>

<!-- POPUP -->
<div id="popup-cantidad">
<div class="popup-content">
<h3 id="popup-nombre"></h3>
<input type="number" id="popup-input" value="1" min="1">
<br><br>
<button onclick="confirmarCantidad()">Agregar</button>
<button onclick="cerrarPopup()">Cancelar</button>
</div>
</div>

<!-- BOTONES -->
<div class="btn-grid">

<div id="mensaje-total" style="display:none;
background:#28a745;color:#fff;padding:8px 14px;margin-bottom:5px;
border-radius:10px;font-weight:bold;
grid-column:span 2;text-align:center;">
💰 Total: Gs. 0
</div>

<button id="btnPizza">PIZZAS</button>
<button id="btnLomitos">LOMITOS</button>
<button id="btnBebidas">BEBIDAS</button>
<button id="btnCarrito">MI PEDIDO</button>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754",
  storageBucket: "alorico-59754.firebasestorage.app",
  messagingSenderId: "120993494626",
  appId: "1:120993494626:web:9f9cb0ad6fbfbd1abd033b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

// NAV
btnPizza.onclick = () => location.href="https://alo-rico.github.io/pizza/";
btnLomitos.onclick = () => location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick = () => location.href="https://alo-rico.github.io/bebidas/";
btnCarrito.onclick = () => {
 document.getElementById("pedido-flotante").classList.toggle("activo");
};

// ESCUCHAR PEDIDO
onValue(pedidoRef, (snapshot) => {
  const data = snapshot.val();
  const lista = document.getElementById("lista-pedido");
  const totalTxt = document.getElementById("total-pedido");
  const mensaje = document.getElementById("mensaje-total");

  lista.innerHTML = "";
  let total = 0;

  if (data) {
    Object.entries(data).forEach(([key, p]) => {
      const li = document.createElement("li");
      li.innerHTML = `${p.cantidad} x ${p.nombre} - Gs. ${(p.precio*p.cantidad).toLocaleString()}`;
      lista.appendChild(li);
      total += p.precio * p.cantidad;
    });

    totalTxt.innerText = "Total: Gs. " + total.toLocaleString();
    mensaje.innerText = "💰 Total: Gs. " + total.toLocaleString();
    mensaje.style.display = "block";
  } else {
    totalTxt.innerText = "";
    mensaje.style.display = "none";
  }
});

// AGREGAR PRODUCTO
window.confirmarCantidad = function(){
 const cant = parseInt(document.getElementById("popup-input").value)||1;

 push(pedidoRef, {
  nombre: productoSeleccionado.nombre,
  precio: productoSeleccionado.precio,
  cantidad: cant
 });

 cerrarPopup();
};

let productoSeleccionado = {};

window.abrirPopup = (n,p)=>{
 productoSeleccionado={nombre:n,precio:p};
 document.getElementById("popup-nombre").innerText=n;
 document.getElementById("popup-cantidad").style.display="flex";
};

window.cerrarPopup = ()=>{
 document.getElementById("popup-cantidad").style.display="none";
};

// BORRAR
document.getElementById("btn-borrar").onclick = ()=> remove(pedidoRef);

// WHATSAPP
document.getElementById("enviar-whatsapp").onclick = ()=>{
 onValue(pedidoRef,(snap)=>{
  const data=snap.val();
  if(!data) return alert("Vacío");

  let msg="Hola quiero pedir:\n";
  let total=0;

  Object.values(data).forEach(p=>{
   msg+=`${p.cantidad} x ${p.nombre}\n`;
   total+=p.precio*p.cantidad;
  });

  msg+=`\nTotal: Gs. ${total.toLocaleString()}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
 },{onlyOnce:true});
};

// CARGAR MENU
const res = await fetch("https://raw.githubusercontent.com/Alo-Rico/hamburguesa/main/precios.json");
const productos = await res.json();
const menu = document.getElementById("menu");

Object.entries(productos).forEach(([n,i])=>{
 const card=document.createElement("div");
 card.className="product";
 card.innerHTML=`<img src="imagen/${i.imagen}"><h3>${n}</h3><p>Gs. ${i.precio}</p>`;
 card.onclick=()=>abrirPopup(n,i.precio);
 menu.appendChild(card);
});

</script>

</body>
</html>
