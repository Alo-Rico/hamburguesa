<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Hamburguesas</title>

<style>
body { font-family: Arial, sans-serif; background:#fefaf0; margin:0; text-align:center; }
header { margin-top:20px; }
header img.logo { width:120px; }
header h1 { font-size:28px; color:#c24a00; }
header img.icono { width:60px; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:140px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}
.product img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px 10px 0 0;
}

/* BOTONES */
.btn-grid {
  position: fixed;
  right: 15px;
  bottom: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  z-index: 9998;
}

.btn-flotante {
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  width: 140px;
}

#btnPizza { background:#ffc107; color:#000; }
#btnLomitos { background:#ff5722; }
#btnBebidas { background:#00bcd4; }
#btnCarrito { background:#007bff; }

/* POPUP CANTIDAD */
#popup-cantidad {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:white;
  padding:20px;
  border-radius:10px;
}

/* PEDIDO */
#pedido-box {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Hamburguesas</h1>
<img src="Repartidor.png" class="icono">
</header>

<div class="menu-container" id="menu"></div>

<!-- POPUP CANTIDAD -->
<div id="popup-cantidad">
  <div class="popup-box">
    <h3 id="popup-nombre"></h3>
    <input type="number" id="cantidad" value="1" min="1">
    <br><br>
    <button onclick="confirmar()">Agregar</button>
    <button onclick="cerrarPopup()">Cancelar</button>
  </div>
</div>

<!-- PEDIDO -->
<div id="pedido-box"></div>

<!-- BOTONES -->
<div class="btn-grid">
  <button id="btnPizza" class="btn-flotante">PIZZAS</button>
  <button id="btnLomitos" class="btn-flotante">LOMITOS</button>
  <button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
  <button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<script>

// 🔥 PEDIDO GLOBAL (COMPARTIDO)
const KEY = "carritoPedido";
let seleccionado = {};

// BOTONES
btnPizza.onclick = () => location.href="https://1967-rob.github.io/pizza/";
btnLomitos.onclick = () => location.href="https://alo-rico.github.io/lomitos/";
btnBebidas.onclick = () => location.href="https://alo-rico.github.io/bebidas/";

// ABRIR POPUP
function abrir(nombre, precio){
  seleccionado = {nombre, precio};
  document.getElementById("popup-nombre").innerText = nombre;
  document.getElementById("popup-cantidad").style.display = "flex";
}

function cerrarPopup(){
  document.getElementById("popup-cantidad").style.display = "none";
}

// CONFIRMAR
function confirmar(){
  const cantidad = parseInt(document.getElementById("cantidad").value);
  const pedido = JSON.parse(localStorage.getItem(KEY)) || [];

  pedido.push({
    nombre: seleccionado.nombre,
    precio: seleccionado.precio,
    cantidad
  });

  localStorage.setItem(KEY, JSON.stringify(pedido));

  cerrarPopup();
}

// VER PEDIDO
btnCarrito.onclick = () => {
  const pedido = JSON.parse(localStorage.getItem(KEY)) || [];
  const box = document.getElementById("pedido-box");

  if(pedido.length===0){
    box.innerHTML = "Pedido vacío";
  } else {
    let html = "<h3>Mi Pedido</h3>";
    let total = 0;

    pedido.forEach(p=>{
      html += `${p.cantidad} x ${p.nombre}<br>`;
      total += p.precio * p.cantidad;
    });

    html += `<br>Total: Gs. ${total.toLocaleString()}`;
    box.innerHTML = html;
  }

  box.style.display = "block";

  // 🔥 AUTO CIERRE 5 SEG
  setTimeout(()=>{
    box.style.display = "none";
  }, 5000);
};

// CARGAR MENU
document.addEventListener('DOMContentLoaded', async () => {
  const menu = document.getElementById('menu');

  const res = await fetch("https://raw.githubusercontent.com/Alo-Rico/hamburguesa/main/precios.json");
  const productos = await res.json();

  Object.entries(productos).forEach(([nombre, info]) => {
    const card = document.createElement('div');
    card.className = 'product';

    card.innerHTML = `
      <img src="imagen/${info.imagen}">
      <h3>${nombre}</h3>
      <p>Gs. ${info.precio.toLocaleString()}</p>
    `;

    card.onclick = () => abrir(nombre, info.precio);

    menu.appendChild(card);
  });
});

</script>

</body>
</html>
