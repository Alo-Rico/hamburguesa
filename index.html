<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú Alorico Hamburguesas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fefaf0;
      text-align: center;
      margin: 0;
      padding: 0;
      padding-bottom: 160px;
    }

    header {
      margin-top: 20px;
    }

    .logo {
      width: 120px;
    }

    .icono {
      width: 60px;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 28px;
      color: #c24a00;
      margin: 10px 0 5px;
    }

    .menu-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      padding-bottom: 320px;
    }

    .product {
      width: 180px;
      background: white;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .product:hover {
      transform: scale(1.03);
    }

    .product img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }

    .product h3 {
      margin: 10px 0 5px;
      font-size: 16px;
    }

    .product p {
      margin: 0 0 10px;
      font-weight: bold;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; 
      top: 0;
      width: 100%; 
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .modal-buttons button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .confirmar { background: #c24a00; color: white; }
    .cancelar { background: #ccc; }

    /* PEDIDO */
    #pedido-flotante {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      border-top: 2px solid #c24a00;
      padding: 10px;
      text-align: left;
      z-index: 900;
    }

    .borrar { background: red; color: white; }
    .whatsapp { background: green; color: white; }

    /* 🔥 BOTONES FLOTANTES */
    .nav-float {
      position: fixed;
      bottom: 90px;
      right: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .nav-float .btn {
      border: none;
      border-radius: 25px;
      padding: 12px 18px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .pizza { background: #f7b500; color: black; }
    .hamburguesa { background: #28a745; }
    .lomito { background: #ff5722; }
    .bebida { background: #00bcd4; }
    .pedido { background: #007bff; }

    @media (max-width: 768px) {
      .nav-float {
        bottom: 110px;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>Menú de Hamburguesas</h1>
  <img src="Repartidor.png" class="icono">
</header>

<div class="menu-container" id="menu"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modal-titulo"></h2>
    <input type="number" id="cantidad" value="1" min="1">
    <div class="modal-buttons">
      <button id="btn-confirmar" class="confirmar">Agregar</button>
      <button id="btn-cancelar" class="cancelar">Cancelar</button>
    </div>
  </div>
</div>

<!-- PEDIDO -->
<div id="pedido-flotante">
  <h3>Mi Pedido</h3>
  <ul id="lista-pedido"></ul>
  <p id="total-pedido"></p>
  <button class="borrar" id="btn-borrar">Borrar todo</button>
  <button class="whatsapp" id="enviar-whatsapp">Enviar pedido</button>
</div>

<!-- 🔥 BOTONES FLOTANTES -->
<div class="nav-float">
  <button id="btnPizza" class="btn pizza">PIZZAS</button>
  <button id="btnHamburguesas" class="btn hamburguesa">HAMBURGUESAS</button>
  <button id="btnLomitos" class="btn lomito">LOMITOS</button>
  <button id="btnBebidas" class="btn bebida">BEBIDAS</button>
  <button id="btnPedido" class="btn pedido">MI PEDIDO</button>
</div>

<script>
// 🔗 NAVEGACIÓN CORRECTA
document.getElementById("btnPizza").onclick = () => {
  window.location.href = "https://1967-rob.github.io/precios-alo-rico/";
};

document.getElementById("btnHamburguesas").onclick = () => {
  window.location.href = "https://alo-rico.github.io/precios-alorico-hamb-lomito/";
};

document.getElementById("btnLomitos").onclick = () => {
  window.location.href = "https://alo-rico.github.io/lomitos/";
};

document.getElementById("btnBebidas").onclick = () => {
  window.location.href = "https://alo-rico.github.io/bebidas/";
};

document.getElementById("btnPedido").onclick = () => {
  document.getElementById("pedido-flotante").scrollIntoView({ behavior: "smooth" });
};

// 🍔 CARGAR MENÚ
document.addEventListener('DOMContentLoaded', async () => {
  const menu = document.getElementById('menu');

  const res = await fetch("https://raw.githubusercontent.com/Alo-Rico/precios-alorico-hamb-lomito/main/precios.json");
  const productos = await res.json();

  Object.entries(productos).forEach(([nombre, info]) => {
    const card = document.createElement('div');
    card.className = 'product';

    card.innerHTML = `
      <img src="imagen/${info.imagen}" alt="${nombre}">
      <h3>${nombre}</h3>
      <p>Gs. ${info.precio.toLocaleString()}</p>
    `;

    menu.appendChild(card);
  });
});
</script>

</body>
</html>
